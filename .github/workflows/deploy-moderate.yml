name: Deploy Moderate Service

on:
  push:
    branches: [main]
    paths:
      - 'moderate/**'

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./moderate
          push: true
          tags: mahdihoucine/joke-moderate:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Deploy to Submit VM via bastion
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SUBMIT_VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          proxy_host: ${{ secrets.KONG_VM_HOST }}
          proxy_username: ${{ secrets.VM_USER }}
          proxy_password: ${{ secrets.VM_PASSWORD }}
          script: |
            docker pull mahdihoucine/joke-moderate:latest
            sudo docker compose -f ~/compose.yaml up -d --no-deps --force-recreate moderate
