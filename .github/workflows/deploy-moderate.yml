name: Deploy Moderate Service

on:
  push:
    branches: [main]
    paths:
      - 'moderate/**'

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./moderate
          push: true
          tags: mahdihoucine/joke-moderate:latest

  deploy:
    runs-on: self-hosted
    needs: build-push
    steps:
      - name: Deploy moderate service
        run: |
          sudo docker pull mahdihoucine/joke-moderate:latest
          sudo docker compose -f ~/compose.yaml up -d --no-deps --force-recreate moderate
