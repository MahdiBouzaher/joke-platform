# Kong config
_format_version: "3.0"

services:
  # Joke API service — the authoritative source, routes exposed at root level
  - name: joke-service
    url: http://10.0.1.10:4000
    routes:
      # Web UI
      - name: joke-root
        paths:
          - /
        methods:
          - GET
        strip_path: false

      # API routes
      - name: joke-types
        paths:
          - /types
        methods:
          - GET
        strip_path: false

      - name: joke-query
        paths:
          - /jokes
        methods:
          - GET
        strip_path: false

      - name: joke-by-type
        paths:
          - /joke
        methods:
          - GET
        strip_path: false

  # Submit service — versioned prefix /submit-ms-v1 strips to expose real endpoints
  # e.g. /submit-ms-v1/submit -> POST /submit
  #      /submit-ms-v1/types  -> GET  /types
  - name: submit-service
    url: http://10.0.1.11:4200
    routes:
      # Web UI entry point
      - name: submit-html
        paths:
          - /submit-form
        methods:
          - GET
        strip_path: true

      # Static files
      - name: submit-css
        paths:
          - /submit.css
        methods:
          - GET
        strip_path: false

      # Swagger docs
      - name: submit-docs
        paths:
          - /docs
        methods:
          - GET
        strip_path: false

      # Versioned prefix route — covers all submit API endpoints
      # strip_path removes /submit-ms-v1 before forwarding to the service
      - name: submit-service-v1
        paths:
          - /submit-ms-v1
        methods:
          - GET
          - POST
        strip_path: true

  # Moderate service — versioned prefix /mod-ms-v1 strips to expose real endpoints
  # e.g. /mod-ms-v1/moderate -> GET  /moderate
  #      /mod-ms-v1/types    -> GET  /types
  - name: moderate-service
    url: http://10.1.1.12:4300
    routes:
      # Web UI entry point (Auth0 returnTo lands here after login)
      - name: moderate-html
        paths:
          - /moderate-form
        methods:
          - GET
        strip_path: true

      # OIDC routes — kept at root so Auth0 config needs no changes
      - name: moderate-callback
        paths:
          - /callback
        methods:
          - GET
          - POST
        strip_path: false

      - name: moderate-logout
        paths:
          - /logout
        methods:
          - GET
        strip_path: false

      - name: moderate-me
        paths:
          - /me
        methods:
          - GET
        strip_path: false

      # Versioned prefix route — covers all moderate API endpoints
      # strip_path removes /mod-ms-v1 before forwarding to the service
      - name: moderate-service-v1
        paths:
          - /mod-ms-v1
        methods:
          - GET
          - POST
        strip_path: true


# Plugins
plugins:
  # Rate limiting on the joke-by-type endpoint
  - name: rate-limiting
    route: joke-by-type
    config:
      minute: 10
      policy: local
