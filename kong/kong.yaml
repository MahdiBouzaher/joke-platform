# Kong config
_format_version: "3.0"

services:
  # Joke API service
  - name: joke-service
    url: http://10.0.1.10:4000 
    routes:
      # Root route
      - name: joke-root
        paths:
          - /
        methods:
          - GET
        strip_path: false

      # Types route
      - name: joke-types
        paths:
          - /types
        methods:
          - GET
        strip_path: false

      # Jokes query route
      - name: joke-query
        paths:
          - /jokes
        methods:
          - GET
        strip_path: false

      # Joke by type route
      - name: joke-by-type
        paths:
          - /joke
        methods:
          - GET
        strip_path: false

  # Submit app service
  - name: submit-service
    url: http://10.0.1.11:4200
    routes:
      # Submit HTML route
      - name: submit-html
        paths:
          - /submit-form
        methods:
          - GET
        strip_path: true

      # Submit POST route
      - name: submit-post
        paths:
          - /submit
        methods:
          - POST
        strip_path: false

      # Submit docs route
      - name: submit-docs
        paths:
          - /docs
        methods:
          - GET
        strip_path: false

  # Moderate app service
  - name: moderate-service
    url: http://10.0.1.11:4300
    routes:
      # Moderate HTML route
      - name: moderate-html
        paths:
          - /moderate-form
        methods:
          - GET
        strip_path: true

      # Moderate GET route
      - name: moderate-get
        paths:
          - /moderate
        methods:
          - GET
        strip_path: false

      # Moderated POST route
      - name: moderated-post
        paths:
          - /moderated
        methods:
          - POST
        strip_path: false

      # Moderate types route
      - name: moderate-types
        paths:
          - /moderate/types
        methods:
          - GET
        strip_path: true

      # OIDC callback route (Auth0 redirects here after login)
      - name: moderate-callback
        paths:
          - /callback
        methods:
          - GET
          - POST
        strip_path: false

      # OIDC logout route
      - name: moderate-logout
        paths:
          - /logout
        methods:
          - GET
        strip_path: false

      # Logged-in user info
      - name: moderate-me
        paths:
          - /me
        methods:
          - GET
        strip_path: false


# Plugins
plugins:
  # Rate limiting plugin
  - name: rate-limiting
    route: joke-by-type
    config:
      minute: 10
      policy: local
