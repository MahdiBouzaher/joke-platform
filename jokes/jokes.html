<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Jokes Central</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="jokes.css">
</head>
<body>
    <header>
        <div class="logo">Jokes<span> Central</span></div>
        <a href="/submit-form" class="submit-link">+ Submit a Joke</a>
    </header>

    <main>
        <div class="hero">
            <h1>Need a <em>laugh?</em></h1>
            <p>Pick a type and count, then press Get Joke</p>
        </div>

        <div class="controls-card">
            <div class="field">
                <label for="typeSelect">Joke Type</label>
                <select id="typeSelect"></select>
            </div>
            <div class="field" style="flex:0">
                <label for="countInput">Count</label>
                <input id="countInput" type="number" min="1" value="1" />
            </div>
            <button id="jokeButton" class="btn-get">Get Joke</button>
        </div>

        <div id="jokeDisplay"></div>
    </main>

    <script>
        (async function () {
            const typeSelect = document.getElementById('typeSelect');
            const countInput = document.getElementById('countInput');
            const jokeButton = document.getElementById('jokeButton');
            const jokeDisplay = document.getElementById('jokeDisplay');

            const escapeHtml = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

            try {
                const r = await fetch('/types');
                const types = await r.json();
                const list = Array.from(new Set(['any', ...types]));
                typeSelect.innerHTML = list.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
            } catch {
                typeSelect.innerHTML = '<option value="any">any</option>';
            }

            jokeButton.addEventListener('click', async () => {
                jokeDisplay.innerHTML = '';
                const type = encodeURIComponent(typeSelect.value || 'any');
                const count = parseInt(countInput.value, 10) || 1;
                try {
                    const res = await fetch(`/joke/${type}?count=${count}`);
                    const data = await res.json();

                    if (!data || (Array.isArray(data) && data.length === 0)) {
                        jokeDisplay.innerHTML = '<div class="empty-state">No jokes found for that type.</div>';
                        return;
                    }

                    if (count === 1) {
                        const joke = Array.isArray(data) ? data[0] : data;
                        const card = document.createElement('div');
                        card.className = 'joke-card';
                        card.innerHTML = `<div class="joke-setup">${escapeHtml(joke.setup || '')}</div>`;
                        jokeDisplay.appendChild(card);

                        setTimeout(() => {
                            const hr = document.createElement('hr');
                            hr.className = 'joke-divider';
                            const punchEl = document.createElement('div');
                            punchEl.className = 'joke-punchline';
                            punchEl.textContent = joke.punchline || '';
                            card.appendChild(hr);
                            card.appendChild(punchEl);
                        }, 3000);
                    } else {
                        const arr = Array.isArray(data) ? data : [data];
                        const table = document.createElement('table');
                        table.innerHTML = `<thead><tr><th>Setup</th><th>Punchline</th><th>Type</th></tr></thead>`;
                        const tbody = document.createElement('tbody');
                        arr.forEach(j => {
                            const tr = document.createElement('tr');
                            tr.innerHTML = `<td>${escapeHtml(j.setup||'')}</td><td>${escapeHtml(j.punchline||'')}</td><td>${escapeHtml(j.type||'')}</td>`;
                            tbody.appendChild(tr);
                        });
                        table.appendChild(tbody);
                        jokeDisplay.appendChild(table);
                    }
                } catch {
                    jokeDisplay.innerHTML = '<div class="error-msg">Failed to fetch joke.</div>';
                }
            });
        })();
    </script>
</body>
</html>
