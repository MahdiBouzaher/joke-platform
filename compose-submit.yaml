
# Docker Compose for Submit VM - submit app only
services:

  # Joke submit app
  submit:
    build: ./submit
    container_name: jokes-submit-app
    ports:
      - "4200:3200"
    env_file:
      - .env
    environment:
      PORT: ${SUBMIT_PORT}
      PUBLIC_URL: ${PUBLIC_BASE_URL}:4200
      RABBITMQ_HOST: ${RABBITMQ_REMOTE_HOST}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      JOKE_SERVICE_URL: ${JOKE_SERVICE_URL}
    volumes:
      - types_cache:/app/cache
    networks:
      - jokes-network
    restart: unless-stopped


# Named volumes
volumes:
  types_cache:


# Custom network
networks:
  jokes-network:
    driver: bridge
