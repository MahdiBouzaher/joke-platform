<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Joke</title>
    <link rel="stylesheet" href="submit.css" />
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Jokes</a>
        <h1>Submit Your Joke</h1>

        <form id="submitForm">
            <div class="form-group">
                <label for="setup">Setup <span class="required">*</span></label>
                <textarea id="setup" name="setup" placeholder="Enter the joke setup..." required></textarea>
            </div>

            <div class="form-group">
                <label for="punchline">Punchline <span class="required">*</span></label>
                <textarea id="punchline" name="punchline" placeholder="Enter the punchline..." required></textarea>
            </div>

            <div class="form-group">
                <label>Joke Type <span class="required">*</span></label>
                <div class="type-toggle">
                    <label class="toggle-option">
                        <input type="radio" name="typeMode" value="existing" id="modeExisting" />
                        Use existing type
                    </label>
                    <label class="toggle-option">
                        <input type="radio" name="typeMode" value="new" id="modeNew" />
                        Add new type
                    </label>
                </div>
                <div id="existingTypePanel">
                    <select id="type" name="type">
                        <option value="">-- Select existing type --</option>
                    </select>
                </div>
                <div id="newTypePanel" style="display:none;">
                    <input type="text" id="newType" name="newType" placeholder="Enter new joke type (e.g., sports, animals)">
                </div>
            </div>

            <button type="submit" id="submitBtn">Submit Joke</button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script>
        const modeExisting = document.getElementById('modeExisting');
        const modeNew = document.getElementById('modeNew');
        const existingTypePanel = document.getElementById('existingTypePanel');
        const newTypePanel = document.getElementById('newTypePanel');

        function setMode(mode) {
            if (mode === 'existing') {
                modeExisting.checked = true;
                existingTypePanel.style.display = 'block';
                newTypePanel.style.display = 'none';
            } else {
                modeNew.checked = true;
                existingTypePanel.style.display = 'none';
                newTypePanel.style.display = 'block';
            }
        }

        modeExisting.addEventListener('change', () => setMode('existing'));
        modeNew.addEventListener('change', () => setMode('new'));

        // Default: use existing type
        setMode('existing');

        // Load joke types into dropdown on page load
        async function loadTypes() {
            try {
                const response = await fetch('/types');
                const types = await response.json();

                const select = document.getElementById('type');

                // Clear existing options except first one
                select.innerHTML = '<option value="">-- Select existing type --</option>';

                // Add each type as an option
                types.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading types:', error);
                showMessage('Failed to load joke types', 'error');
            }
        }

        // Handle form submission
        document.getElementById('submitForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const setup = document.getElementById('setup').value.trim();
            const punchline = document.getElementById('punchline').value.trim();
            const type = modeNew.checked ? '' : document.getElementById('type').value;
            const newType = modeNew.checked ? document.getElementById('newType').value.trim() : '';

            // Validation: must have setup and punchline
            if (!setup || !punchline) {
                showMessage('Please enter both setup and punchline', 'error');
                return;
            }

            // Validation: must select type OR enter new type
            if (!type && !newType) {
                showMessage('Please select a type or enter a new type', 'error');
                return;
            }

            // Disable submit button during request
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        setup: setup,
                        punchline: punchline,
                        type: type,
                        newType: newType
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage(result.message || 'Joke submitted successfully!', 'success');

                    // Clear form
                    document.getElementById('submitForm').reset();
                    setMode('existing');

                    // Reload types (in case new type was added)
                    await loadTypes();
                } else {
                    showMessage(result.error || 'Failed to submit joke', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Network error: Failed to submit joke', 'error');
            } finally {
                // Re-enable submit button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Joke';
            }
        });

        // Show message to user
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            // Hide message after 5 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Load types when page loads and poll every 5 seconds
        loadTypes();
        setInterval(loadTypes, 5000);
    </script>
</body>
</html>
