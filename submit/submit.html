<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Submit a Joke — Jokes Central</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="submit.css">
</head>
<body>
    <header>
        <div class="logo">Jokes<span> Central</span></div>
        <a href="/" class="back-link">← Back to Jokes</a>
    </header>

    <main>
        <div class="hero">
            <h1>Got a <em>joke?</em></h1>
            <p>Share it with the world — if it's good enough.</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label for="setup">Setup <span class="required">*</span></label>
                <textarea id="setup" placeholder="Enter the joke setup..."></textarea>
            </div>

            <div class="form-group">
                <label for="punchline">Punchline <span class="required">*</span></label>
                <textarea id="punchline" placeholder="Enter the punchline..."></textarea>
            </div>

            <hr class="divider" />

            <div class="form-group">
                <label>Joke Type <span class="required">*</span></label>
                <div class="type-toggle">
                    <label class="toggle-option">
                        <input type="radio" name="typeMode" value="existing" id="modeExisting" />
                        Use existing type
                    </label>
                    <label class="toggle-option">
                        <input type="radio" name="typeMode" value="new" id="modeNew" />
                        Add new type
                    </label>
                </div>
                <div id="existingTypePanel">
                    <select id="type">
                        <option value="">— Select a type —</option>
                    </select>
                </div>
                <div id="newTypePanel" style="display:none;">
                    <input type="text" id="newType" placeholder="e.g. sports, animals, tech..." />
                </div>
            </div>

            <button class="btn-submit" id="submitBtn">Submit Joke</button>
            <div id="message" class="message"></div>
        </div>
    </main>

    <script>
        const modeExisting = document.getElementById('modeExisting');
        const modeNew = document.getElementById('modeNew');
        const existingTypePanel = document.getElementById('existingTypePanel');
        const newTypePanel = document.getElementById('newTypePanel');

        function setMode(mode) {
            if (mode === 'existing') {
                modeExisting.checked = true;
                existingTypePanel.style.display = 'block';
                newTypePanel.style.display = 'none';
            } else {
                modeNew.checked = true;
                existingTypePanel.style.display = 'none';
                newTypePanel.style.display = 'block';
            }
        }

        modeExisting.addEventListener('change', () => setMode('existing'));
        modeNew.addEventListener('change', () => setMode('new'));
        setMode('existing');

        async function loadTypes() {
            try {
                const res = await fetch('/types');
                const types = await res.json();
                const select = document.getElementById('type');
                select.innerHTML = '<option value="">— Select a type —</option>';
                types.forEach(t => {
                    const o = document.createElement('option');
                    o.value = t; o.textContent = t;
                    select.appendChild(o);
                });
            } catch {
                showMessage('Failed to load joke types', 'error');
            }
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const setup = document.getElementById('setup').value.trim();
            const punchline = document.getElementById('punchline').value.trim();
            const type = modeNew.checked ? '' : document.getElementById('type').value;
            const newType = modeNew.checked ? document.getElementById('newType').value.trim() : '';

            if (!setup || !punchline) { showMessage('Please enter both setup and punchline', 'error'); return; }
            if (!type && !newType) { showMessage('Please select a type or enter a new type', 'error'); return; }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Submitting...';

            try {
                const res = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ setup, punchline, type, newType })
                });
                const result = await res.json();
                if (res.ok) {
                    showMessage(result.message || 'Joke submitted successfully!', 'success');
                    document.getElementById('setup').value = '';
                    document.getElementById('punchline').value = '';
                    setMode('existing');
                    await loadTypes();
                } else {
                    showMessage(result.error || 'Failed to submit joke', 'error');
                }
            } catch {
                showMessage('Network error: Failed to submit joke', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Submit Joke';
            }
        });

        function showMessage(text, type) {
            const el = document.getElementById('message');
            el.textContent = text;
            el.className = `message ${type}`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        loadTypes();
        setInterval(loadTypes, 5000);
    </script>
</body>
</html>
