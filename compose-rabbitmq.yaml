
# Docker Compose for RabbitMQ VM — RabbitMQ broker only
services:

  # RabbitMQ broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: jokes-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    networks:
      - jokes-network
    restart: unless-stopped


# Custom network
networks:
  jokes-network:
    driver: bridge
