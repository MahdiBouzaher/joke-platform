
# Docker Compose for joke platform
services:

  # MySQL database - only starts with: docker compose --profile mysql up
  mysql:
    profiles: ["mysql"]
    image: mysql:8
    container_name: jokes-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_vol:/var/lib/mysql
      - ./dbinit/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jokes-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-padmin"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # MongoDB database - only starts with: docker compose --profile mongo up
  mongodb:
    profiles: ["mongo"]
    image: mongo:8
    container_name: jokes-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo_vol:/data/db
      - ./dbinit/mongo-seed.js:/docker-entrypoint-initdb.d/mongo-seed.js
    networks:
      - jokes-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # RabbitMQ broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: jokes-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    networks:
      - jokes-network
    restart: unless-stopped

  # Joke API app
  joke:
    build: ./jokes
    container_name: jokes-joke-app
    ports:
      - "4000:3000"
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_TYPE: ${DB_TYPE}
      MONGO_URI: ${MONGO_URI}
      PORT: ${PORT}
      PUBLIC_URL: ${PUBLIC_BASE_URL}:4000
    networks:
      - jokes-network
    restart: unless-stopped

  # ETL service
  etl:
    build: ./etl
    container_name: jokes-etl
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_TYPE: ${DB_TYPE}
      MONGO_URI: ${MONGO_URI}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
    depends_on:
      rabbitmq:
        condition: service_started
    networks:
      - jokes-network
    restart: unless-stopped

  # Joke submit app
  submit:
    build: ./submit
    container_name: jokes-submit-app
    ports:
      - "4200:3200"
    env_file:
      - .env
    environment:
      PORT: ${SUBMIT_PORT}
      PUBLIC_URL: ${PUBLIC_BASE_URL}:4200
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      JOKE_SERVICE_URL: ${JOKE_SERVICE_URL}
    volumes:
      - types_cache:/app/cache
    depends_on:
      rabbitmq:
        condition: service_started
    networks:
      - jokes-network
    restart: unless-stopped

  # Joke moderate app
  moderate:
    build: ./moderate
    container_name: jokes-moderate-app
    ports:
      - "4300:3300"
    env_file:
      - .env
    environment:
      PORT: ${MODERATE_PORT}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
    volumes:
      - moderate_cache:/app/cache
    depends_on:
      rabbitmq:
        condition: service_started
    networks:
      - jokes-network
    restart: unless-stopped


# Named volumes
volumes:
  mysql_vol:
  mongo_vol:
  types_cache:
  moderate_cache:


# Custom network
networks:
  jokes-network:
    driver: bridge
